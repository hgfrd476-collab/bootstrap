<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <br><br><br>
   
    <form style="margin: auto; width: 50vh; height: 500px;">
    <fieldset>
        <legend>Personal Detail</legend>
        <label for="">First Name :</label> 
        <input type="text" style="width: 200px; height: 30px; border: 1px solid rgb(0, 0, 0); margin-top: 5px;"> 
        <br><br>
        <label for="">Last Name :</label> 
        <input type="text" style="width: 200px; height: 30px; border: 1px solid rgb(0, 0, 0); margin-top: 5px;"> 
        <br> <br>
        <label>Gender :</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label> 
        <br>
        <br>
        <label for="">Email :</label>
        <input type="email" style="width: 200px; height: 30px; border: 1px solid rgb(0, 0, 0); margin-top: 5px;">
        <br><br>
        <label for="">Date of birth :</label>
        <input type="date" style="width: 200px; height: 30px; border: 1px solid rgb(0, 0, 0); margin-top: 5px;">
        <br><br>
        <textarea name="" id="">Address</textarea>
        <br>
        <button style="width: 150px; height: 37px; border: 1px solid rgb(0, 0, 0); 
                margin-top: 5px;background-color: rgb(113, 113, 113);
                margin-top: 10px;" 
        >Sumit</button>
    </fieldset>
    </form>
</body>
</html>
