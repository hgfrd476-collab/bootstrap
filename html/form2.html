<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
             margin: 0;
             height: 100vh;
            background-image: url(https://i.pinimg.com/1200x/d3/7e/3e/d37e3ebd66d484d4af0c6e5750548248.jpg);
            background-size: cover;
            background-position: center; 
            background-repeat: no-repeat;
        }
    </style> 
</head>
<body>
    <br>
    <br>

    <form action=" "
    style="width: 20%; height: 550px; 
    border:   2px solid black; 
    background-color:rgba(51, 52, 52, 0.098);
    text-align: left; margin: auto; 
    padding: 40px; 
    color:rgb(62, 75, 62);
    border-radius: 20px;">
    <h3 align="center">REGISTER FORM</h3>
    <br>
        <label for="">Full Name</label> <br>
        <input style="width: 300px; height: 30px; border: 2px solid black; border-radius: 10px;" 
        type="text" placeholder="Enter Your Full Name"> 
        <br>
        <br>
        <label for="">Username</label> <br>
        <input style="width: 300px; height: 30px; border: 2px solid black; border-radius: 10px;"  
        type="text" placeholder="Enter Your Full Name">
        
        <br>
        <br>
        <label for="">Password</label> <br>
        <input style="width: 300px; height: 30px; border: 2px solid black; border-radius: 10px;" 
         type="password" placeholder="Enter password">
         <br>
         <br>
        <label for="">Email</label> <br>
        <input  style="width: 300px; height: 30px; border:2px solid black; border-radius: 10px;" 
         type="text" placeholder="Enter Email">
        <br>
        <br>
        <label for="">Age</label> <br>
        <input style="width: 300px; height: 30px; border: 2px solid black; border-radius: 10px;" 
         type="number" placeholder="Enter Age">
         <br>
         <br>
         <label for="">Phone</label> <br>
         <input style="width: 300px; height: 30px; border: 2px solid black; border-radius: 10px;" 
          type="number" placeholder="Enter Phone Number">
         <br>
         <br>
        <br>
         <button style="border: 1px solid black; width: 100px; height: 30px; border-radius: 10px;">Register </button>
         <button style="border: 1px solid black; width: 100px; height: 30px; border-radius: 10px;" > Clear </button>
    </form>
</body>
</html>
