<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <br><b></b><br><br>
    <form style="margin: auto; width: 50vh; height: 500px;">
    <fieldset>
        <legend>Personal Detail</legend>
        <label for="">Full Name :</label> 
        <input type="text" style="width: 200px; height: 30px; border: 1px solid rgb(0, 0, 0); margin-top: 5px;"> 
        <br><br>
        <label for="">Email Address :</label> 
        <input type="text" style="width: 200px; height: 30px; border: 1px solid rgb(0, 0, 0); margin-top: 5px;"> 
        <br> <br>
        <label for="">Password :</label> 
        <input type="password" style="width: 200px; height: 30px; border: 1px solid rgb(0, 0, 0); margin-top: 5px;"> 
        <br> <br>
        <label for="">Date of birth :</label>
        <input type="date" style="width: 200px; height: 30px; border: 1px solid rgb(0, 0, 0); margin-top: 5px;">
        <br><br>
        <label>Gender :</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label> 
        <br>
        <br>
        <label for="">Cuse :</label>
        <select name="" id="" style="width: 200px; height: 30px; border: 1px solid rgb(0, 0, 0); margin-top: 5px;"> 
            <option value="">HTML</option>
            <option value="">froent</option>
            <option value="">backent</option>
        </select> <br><br>
        <label for="">Skill you have</label> <br>
        <input type="checkbox" style="margin-top: 5px;">HTML  <br>
        <input type="checkbox" style="margin-top: 5px;">CSS <br>
        <input type="checkbox" style="margin-top: 5px;">JAVASCRIP <br><br>
        <textarea name="" id="">Aditional Comments :</textarea>
        <br>
        <button  style="width: 130px; height: 30px; border: 1px solid rgb(0, 0, 0); 
                margin-top: 5px;background-color: rgb(158, 158, 158);
                margin-top: 10px;" 
        >Choose File</button>
        <label for="">No file chosen</label><br>
        <button  style="width: 130px; height: 30px; border: 1px solid rgb(0, 0, 0); 
                margin-top: 5px;background-color: rgb(158, 158, 158);
                margin-top: 10px;" 
        >Uplode</button>
        <br>
        <button style="width: 130px; height: 30px; border: 1px solid rgb(0, 0, 0); 
                margin-top: 5px;background-color: rgb(158, 158, 158);
                margin-top: 10px;" 
        >Regester</button>
    </fieldset>
    </form>
</body>
</html>
