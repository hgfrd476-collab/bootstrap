<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }
    body{
        background-image: url(https://i.pinimg.com/736x/b6/48/5d/b6485d873319c9d08ef1d46bbb0e7508.jpg);
        /* padding: 50px; */
    }
    .all{
        width: 100%;
        height: 100%;
        padding: 95px;
        background-color: rgba(255, 253, 253, 0.34);
    }
    .form{
        background-color:rgba(255, 255, 255, 0.593);
        margin: auto;
        /* margin-top: 60px; */
        width: 400px;
        height: 600px;
        
        box-shadow: 0 0 5px rgb(23, 122, 69);
        border: 0px;
        border: 1px solid gray;
        border-radius: 30px;
        padding: 30px;
    }
    label{
        font-size: 20px;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    input{
        font-size: 15px;
        width: 355px;
        height: 45px;
        border: 1px solid black; 
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        border-radius: 17px;
    }
    .ler{
        line-height: 43px;
    }
    .krom{
        gap: 10px;
        display: flex;
    }
    .krom>.old {
        line-height: 40px;
        box-shadow: 0 0 5px rgb(109, 76, 255);
        border: 2px solid gray;
        margin-top: 35px;
        width: 170px;
        height: 35px;
        border: 0px;
        border-radius: 10px;
        font-size: 17px;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    .krom>.new{
        line-height: 40px;
        box-shadow: 0 0 5px rgb(109, 76, 255);
        margin-top: 35px;
        width: 170px;
        height: 35px;
        border: 0px;
        border-radius: 10px;
        font-size: 17px;
        background-color: gray;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    .form h1{
        text-align: center;
        font-size: 40px;
    }
    .form p{
        text-align: center;
    }
</style>
<body>
    <div class="all">   
        <div class="form">
            <div class="ler">
                <h1>Login</h1>
                <p>Input your information</p>
                <label for="">+ UserName</label> <br>
                <input type="text" placeholder="Enter your UserName"> <br>
                <label for="">+ Email</label> <br>
                <input type="email" placeholder="Enter your Email"> <br>
                <label for="">+ Password</label> <br>
                <input type="password" placeholder="Enter your Password"><br>
                <label for="">+ Comferm Password</label> <br>
                <input type="password" placeholder="Enter your Password"><br>
            </div>
            <div class="krom">
                <button class="old" >Cancel</button>
                <button class="new"><a class="nav-link" href="../bootstrap/design1.html">Comferm</a></button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
