<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }
    body{
        background-image: url(https://i.pinimg.com/1200x/fc/37/b6/fc37b6247386724a9ef3830162a744ad.jpg);
        padding: 50px;
    }
    .singin{
        border-radius: 30px;
        margin: auto;
        background-color: rgba(0, 0, 139, 0.322);
        width: 90%;
        height: 700px;
        padding: 30px;
        display: flex;
        justify-content: center;
        gap: 50px;
    }

    .singin>.pic{
        box-shadow: 0 0 3px gray;
        width: 35%;
        height: 600px;
        border: 1px solid gray;
        border-radius: 30px;
    }
    .singin>.pic img{
        width: 100%;
        height: 100%;
        border-radius: 30px;
    }
    .singin>.form{
        width: 35%;
        height: 600px;
        border: 0px;
        box-shadow: 0 0 3px gray;
        border: 1px solid gray;
        border-radius: 30px;
        padding: 30px;
    }
    label{
        
        margin-left: 20px;
        font-size: 30px;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    input{
        box-shadow: 0 0 3px gray;
        margin-left: 20px;
        font-size: 20px;
        width: 90%;
        height: 40px;
        border: 0px; 
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        border-radius: 17px;
    }
    .ler{
        line-height: 60px;
    }
    .krom{
        line-height: 40px;
    }
    .old{
        margin-left: 20px;
        
        box-shadow: 0 0 3px black;
        margin-top: 55px;
        width: 90%;
        height: 35px;
        border: 0px;
        border-radius: 20px;
        font-size: 17px;
        background-color: rgb(9, 103, 255);
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    .new{
        margin-left: 20px;
        box-shadow: 0 0 3px black;
        width: 90%;
        height: 35px;
        border: 0px;
        border-radius: 20px;
        text-decoration: none;
    }
    .new a{
        font-size: 17px;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        text-decoration: none;
    }
    .singin>.form h1{
        text-align: center;
        font-size: 40px;
    }
    .singin>.form p{
        text-align: center;
    }
</style>
<body>
    <br>
    <div class="singin">
        <div class="pic">
            <img src="https://i.pinimg.com/1200x/64/04/ca/6404ca2366db1b90d092d014d84b8a9a.jpg" alt="">
        </div>
        <div class="form">
            <div class="ler">
                <h1>Sign in</h1>
                <p>Unlock your acound</p>
                <label for="">+Email</label> <br>
                <input type="email" placeholder="Enter your email"> <br>
                <label for="">+Password</label> <br>
                <input type="password" placeholder="Enter your Password"><br>
            </div>
            <div class="krom">
                <button class="old">Sign In</button>
                <p style="text-align: center ; color:white">or</p>
                <button class="new"><a href="../html_withcss/exercise5_1.html">Create new accound</a></button>
            </div>
        </div>
    </div>
</body>
</html>
