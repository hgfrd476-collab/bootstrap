<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>responsive</title>
    <style>
        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }
        .all{
            width: 100%;
            height: 700px;
            background-color: pink;
            display: flex;
        }
        .continer{
            width: 80%;
            background-color: burlywood;
            display: grid;
            grid-auto-rows: 300px;
            padding: 20px;
            gap: 20px;
            margin-left: 150px;
        }
        .sidebar{

            position: fixed;
            background-color: blue;
            width: 150px;
            height: 700px;
        }
        @media screen and (max-width:550px) {
            .continer {
                grid-template-columns: repeat(1,1fr);
            }
        }
        @media screen and (min-width:600px){
            .continer {
                grid-template-columns: repeat(2,1fr);
            }
        }
        @media screen and (min-width:1024px){
            .continer {
                grid-template-columns: repeat(4,1fr);
            }
        }
        .card{
            background-color: blue;
        }
        
    </style>
</head>
<body>
    <div class="all">  
    <div class="sidebar">
        <ul class="list">
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>
    </div>
    <div class="continer">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
    </div>
    </div>
</body>
</html>
