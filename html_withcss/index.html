<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .header{
            color: red;
            text-align: center;
        }
        .container{
            width: 23vw;
            height: 60vh;
            background-color: rgb(192, 211, 248);
            border: 2px solid gray;
            margin: 15px auto;
            border-radius: 25px;
            padding: 20px;
        }
        .container img{
            width: 100%;
            height: 60%;
            border: 1px solid rgb(0, 11, 80);
            border-radius: 15px;
        }
        .container button{
            width: 130px; 
            height: 40px; 
            border: 1px solid rgb(0, 11, 80); 
            border-radius: 5px;
            margin-top: 5px;background-color:rgb(129, 149, 190);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1 class="header">learn about css</h1>
    <br><br>
    <div class="container">
        <img src="https://i.pinimg.com/736x/9a/85/22/9a852242b57a1fff447319b9f157ea86.jpg" alt="">
        <h3>Price: $9.99</h3>
        <p>figures featuring popular characters from the anime series Chainsaw Man and Jujutsu Kaisen.</p>
        <button>Add to Card</button>
    </div>
</body>
</html>
